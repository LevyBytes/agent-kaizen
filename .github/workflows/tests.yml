name: tests

# One authoritative control per present risk. Do NOT add Socket, CodeQL, Bandit, OSV,
# zizmor, Dependency Review, or a Dependabot bot lane to this workflow: those are deferred
# controls, each enabled only for a named gap after its own review (see the v5 PR-standards
# plan). Actions are pinned to full commit SHAs; review each update before replacing a pin.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow:
        description: Run the explicit subprocess/concurrency/timeout/integration lane on both operating systems
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: unittest (${{ matrix.lane_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Run the portable core once; only bounded host contracts are duplicated across operating systems.
          - lane_name: portable-core-posix
            os: ubuntu-latest
            lane_args: --lane core --lane platform
          - lane_name: windows-platform
            os: windows-latest
            lane_args: --lane platform
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pinned dependencies
        run: python -m pip install -r requirements-kaizen.txt
      - name: Run required bounded lanes
        run: python tests/run_tests.py ${{ matrix.lane_args }}

  slow:
    name: slow explicit (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pinned dependencies
        run: python -m pip install -r requirements-kaizen.txt
      - name: Run explicitly requested slow lane
        run: python tests/run_tests.py --lane slow

  audit:
    # The VS Code extension foundation remains in-tree, but its Node/VSIX lane is intentionally not a public CI gate until the owner declares the extension release-ready.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Audit declared dependencies for known advisories
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit -r requirements-kaizen.txt -r requirements-docs.txt -r requirements-pytorch.txt

  dco:
    # Developer Certificate of Origin gate: every non-bot PR commit needs a Signed-off-by trailer.
    # Runs only on pull_request and executes the frozen base branch validator, never PR code.
    # The bootstrap PR must merge before this job can be calibrated and made required.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .dco-base
          sparse-checkout: security/validate_dco.py
          sparse-checkout-cone-mode: false
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Validate DCO sign-off
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .dco-base/security/validate_dco.py --event-file "$GITHUB_EVENT_PATH" --repository "$GITHUB_REPOSITORY" --json
