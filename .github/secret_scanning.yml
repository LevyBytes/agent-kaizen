# Exclude the redaction unit test from GitHub secret scanning.
#
# tests/test_redaction.py intentionally contains secret-SHAPED fixtures (fake API keys,
# tokens, and paths) to prove that kaizen_components/redaction.py detects and denies them.
# They are not real credentials, so scanning this file only ever produces false positives.
# Every other file remains scanned normally.
paths-ignore:
  - "tests/test_redaction.py"
