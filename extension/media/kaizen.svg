<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     role="img"
     aria-labelledby="title desc"
     shape-rendering="geometricPrecision">

  <title id="title">Agent Kaizen Logo</title>

  <desc id="desc">
    Agent Kaizen is an open source, local-first agentic engineering framework
    and harness for AI coding agents in VS Code and other supported code editors:
    a five-layer method (SAVMI - Scope, Adapt, Verify, Manage, Improve) plus a
    92-operation CLI that writes every task, plan, go/no-go verification,
    artifact hash, and validated lesson to one queryable SQLite-compatible
    (Turso/libSQL) database on your machine. Auditable agent memory and session
    continuity for Claude Code, Codex, and other agent hosts, built on recorded
    evidence instead of chat recollection.
  </desc>

